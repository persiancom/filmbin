<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>دانلود فیلم و سریال</title>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0000 0%, #3a0000 25%, #1a0000 50%, #4a0000 75%, #1a0000 100%);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            font-family: 'Segoe UI', 'Poppins', Tahoma, sans-serif;
            min-height: 100vh;
            color: #fff;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .login-box {
            background: rgba(30, 10, 10, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 60, 60, 0.5);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
            text-align: center;
        }

        .login-logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 30px;
            overflow: hidden;
            border: 3px solid #cc0000;
            background: #1a0808;
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-box h2 {
            color: #ff8888;
            margin-bottom: 35px;
            font-size: 2rem;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #ffaaaa;
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(50, 20, 20, 0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #cc3333;
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #cc0000;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .login-btn:hover {
            background: #ff1a1a;
        }

        .error-msg {
            color: #ff6666;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .app-page {
            display: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .main-header {
            background: rgba(30, 10, 10, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 12px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid rgba(255, 50, 50, 0.4);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info span {
            font-size: 0.85rem;
        }

        .user-info strong {
            font-size: 0.9rem;
        }

        .logout-btn {
            background: rgba(50, 20, 20, 0.7);
            border: 1px solid #cc3333;
            padding: 6px 16px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .logout-btn:hover {
            background: #4a1515;
        }

        .hero-banner {
            margin-bottom: 30px;
            border-radius: 30px;
            overflow: hidden;
        }

        .hero-banner img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }

        .hero-text {
            text-align: center;
            margin-top: -50px;
            position: relative;
            z-index: 2;
            padding-bottom: 25px;
        }

        .hero-text h2 {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.5rem;
        }

        .category-tabs {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: rgba(30, 10, 10, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #cc3333;
            padding: 10px 30px;
            border-radius: 50px;
            color: #ffaaaa;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        .category-btn.active {
            background: #cc0000;
            color: white;
            border-color: #ff7777;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: rgba(30, 10, 10, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 60, 60, 0.4);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #ff5555;
            background: rgba(40, 15, 15, 0.55);
        }

        .card-img {
            width: 100%;
            height: 250px;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover .card-img img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffcccc;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episodes-dropdown {
            background: rgba(40, 15, 15, 0.6);
            border-radius: 12px;
            overflow: hidden;
        }

        .dropdown-header {
            background: rgba(50, 15, 15, 0.7);
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffaaaa;
            font-size: 0.8rem;
        }

        .dropdown-header:hover {
            background: rgba(80, 25, 25, 0.8);
        }

        .dropdown-arrow {
            transition: transform 0.3s ease;
        }

        .dropdown-arrow.open {
            transform: rotate(180deg);
        }

        .dropdown-content {
            max-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            transition: max-height 0.4s ease-out;
            background: rgba(25, 8, 8, 0.7);
        }

        .dropdown-content.show {
            max-height: 280px;
        }

        /* اسکرول بار زیبا */
        .dropdown-content::-webkit-scrollbar {
            width: 4px;
        }

        .dropdown-content::-webkit-scrollbar-track {
            background: #2a0a0a;
            border-radius: 4px;
        }

        .dropdown-content::-webkit-scrollbar-thumb {
            background: #cc0000;
            border-radius: 4px;
        }

        .episode-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid rgba(255, 50, 50, 0.2);
            text-decoration: none;
            color: #ffcccc;
            font-size: 0.75rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        .episode-link:hover {
            background: rgba(60, 20, 20, 0.8);
        }

        .episode-name {
            flex: 1;
            min-width: 70px;
        }

        .episode-buttons {
            display: flex;
            gap: 8px;
        }

        .play-btn {
            background: #2a7a2a;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.65rem;
            cursor: pointer;
            border: none;
            color: white;
        }

        .play-btn:hover {
            background: #3a9a3a;
        }

        .download-badge {
            background: #b91c1c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            display: inline-block;
        }

        .download-badge:hover {
            background: #ff1a1a;
        }

        /* مودال پخش ویدیو */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .video-modal-content {
            width: 90%;
            max-width: 1000px;
            position: relative;
        }

        .close-video {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .close-video:hover {
            color: #ff0000;
        }

        .video-js {
            width: 100%;
            border-radius: 16px;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: #ffaa33;
            border-top: 1px solid rgba(255, 50, 50, 0.3);
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            .card-img {
                height: 200px;
            }
            .card-title {
                font-size: 0.85rem;
            }
            .hero-text h2 {
                font-size: 1rem;
            }
            .category-btn {
                padding: 6px 18px;
                font-size: 0.85rem;
            }
            .episode-link {
                flex-direction: column;
                align-items: flex-start;
            }
            .episode-buttons {
                margin-top: 5px;
            }
            .dropdown-content.show {
                max-height: 220px;
            }
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">

            <div class="input-group">
                <label>نام کاربری</label>

            </div>
            <div class="input-group">

<div id="appPage" class="app-page">

        <div class="hero-banner">
            <img src="https://github.com/persiancom/filmbin/blob/main/file_00000000d35471fb9298f545464b46f0.png?raw=true" alt="Hero Banner">
        </div>
        <div class="hero-text">
            <h2>✨ دانلود و تماشای فیلم و سریال ایرانی و خارجی ✨</h2>
        </div>

        <div class="category-tabs">
            <button class="category-btn active" data-category="iranian" onclick="filterMovies('iranian')">🇮🇷 سریال‌های ایرانی</button>
            <button class="category-btn" data-category="foreign" onclick="filterMovies('foreign')">🌍 سریال‌های خارجی</button>
        </div>

        <div id="moviesGrid" class="movies-grid"></div>

        <div class="footer">
            🎬 تهیه شده توسط Hamidreza
        </div>
    </div>
</div>

<!-- مودال پخش ویدیو -->

</div>

                { name: "قسمت دوم", url: "https://cdn.uptvs.com/?s=11&f=serial5/The%20Boroughs/1/The.Boroughs.S01.E02.720p.Sub_UPTV.co.mkv" },
                { name: "قسمت سوم", url: "https://cdn.uptvs.com/?s=11&f=serial5/The%20Boroughs/1/The.Boroughs.S01.E03.720p.Sub_UPTV.co.mkv" },
                { name: "قسمت چهارم", url: "https://cdn.uptvs.com/?s=11&f=serial5/The%20Boroughs/1/The.Boroughs.S01.E04.720p.Sub_UPTV.co.mkv" },
                { name: "قسمت پنجم", url: "https://cdn.uptvs.com/?s=11&f=serial5/The%20Boroughs/1/The.Boroughs.S01.E05.720p.Sub_UPTV.co.mkv" },
                { name: "قسمت ششم", url: "https://cdn.uptvs.com/?s=11&f=serial5/The%20Boroughs/1/The.Boroughs.S01.E06.720p.Sub_UPTV.co.mkv" },

                { name: "قسمت هشتم", url: "https://cdn.uptvs.com/?s=11&f=serial5/The%20Boroughs/1/The.Boroughs.S01.E08.720p.Sub_UPTV.co.mkv" }
            ]
        }
    ];

    let currentUser = null;
    let currentCategory = "iranian";
    let currentVideoPlayer = null;

    function filterMovies(category) {
        currentCategory = category;
        document.querySelectorAll('.category-btn').forEach(btn => {
            if (btn.getAttribute('data-category') === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        renderMovies();
    }

    function playVideo(url, title) {
        const modal = document.getElementById("videoModal");
        const video = document.getElementById("my-video");
        
        if (currentVideoPlayer) {
            currentVideoPlayer.dispose();
        }
        
        currentVideoPlayer = videojs(video, {
            controls: true,
            autoplay: true,
            preload: "auto",
            fluid: true,
            playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2]
        });
        
        currentVideoPlayer.src({ src: url, type: "video/mp4" });
        currentVideoPlayer.load();
        modal.style.display = "flex";
        currentVideoPlayer.play();
    }
    
    function closeVideoPlayer() {
        const modal = document.getElementById("videoModal");
        if (currentVideoPlayer) {
            currentVideoPlayer.pause();
            currentVideoPlayer.dispose();
            currentVideoPlayer = null;
        }
        modal.style.display = "none";
    }

    function renderMovies() {
        const grid = document.getElementById("moviesGrid");
        if (!grid) return;
        
        const filteredMovies = moviesData.filter(movie => movie.category === currentCategory);
        
        if (filteredMovies.length === 0) {
            grid.innerHTML = `<div style="text-align:center; grid-column:1/-1; padding:60px; background:rgba(30,10,10,0.5); backdrop-filter:blur(10px); border-radius:30px;">🎬 در این دسته سریالی وجود ندارد</div>`;
            return;
        }
        
        grid.innerHTML = filteredMovies.map((movie, movieIndex) => {
            const hasValidEpisodes = movie.episodes && movie.episodes.length > 0;
            const uniqueId = `dropdown-${movie.id}-${movieIndex}`;
            
            return `
                <div class="card" data-card-id="${movie.id}">
                    <div class="card-img">
                        <img src="${movie.image}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/500x700/1a0808/cc0000?text=No+Poster'">
                    </div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(movie.title)}</div>
                        ${hasValidEpisodes ? `
                            <div class="episodes-dropdown">
                                <div class="dropdown-header" onclick="toggleDropdown(this, '${uniqueId}')">
                                    <span>📥 لینک‌های دانلود و پخش</span>
                                    <span class="dropdown-arrow">▼</span>
                                </div>
                                <div class="dropdown-content" id="${uniqueId}">
                                    ${movie.episodes.map(ep => `
                                        <div class="episode-link">
                                            <span class="episode-name">${escapeHtml(ep.name)}</span>
                                            <div class="episode-buttons">
                                                ${ep.url ? `<button class="play-btn" onclick="playVideo('${escapeHtml(ep.url)}', '${escapeHtml(movie.title)} - ${escapeHtml(ep.name)}')">▶ پخش</button>` : ''}
                                                ${ep.url ? `<a href="${escapeHtml(ep.url)}" class="download-badge" target="_blank">📥 دانلود</a>` : '<span class="download-badge" style="background:#442222;">به زودی</span>'}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : '<span style="color:#883333; display:block; padding:10px 0; text-align:center;">⏳ لینک‌ها به زودی اضافه می‌شوند</span>'}
                    </div>
                </div>
            `;
        }).join("");
    }
    
    function toggleDropdown(header, dropdownId) {
        const allDropdownContents = document.querySelectorAll('.dropdown-content');
        const allDropdownArrows = document.querySelectorAll('.dropdown-arrow');
        
        const currentContent = document.getElementById(dropdownId);
        const currentArrow = header.querySelector('.dropdown-arrow');
        
        if (currentContent && currentContent.classList.contains('show')) {
            currentContent.classList.remove('show');
            currentArrow.classList.remove('open');
        } else {
            allDropdownContents.forEach(content => {
                content.classList.remove('show');
            });
            allDropdownArrows.forEach(arrow => {
                arrow.classList.remove('open');
            });
            
            if (currentContent) {
                currentContent.classList.add('show');
                currentArrow.classList.add('open');
            }
        }
    }
    
    function attemptLogin() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;
        const user = USERS_LIST.find(u => u.username === username && u.password === password);
        
        if (user) {
            currentUser = user;
            localStorage.setItem("cinema_currentUser", JSON.stringify({ username: user.username }));
            showMainPage();
        } else {
            document.getElementById("loginError").innerText = "❌ نام کاربری یا رمز عبور اشتباه است";
        }
    }
    
    function showMainPage() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";
        document.getElementById("currentUserDisplay").innerHTML = currentUser.username;
        renderMovies();
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("cinema_currentUser");
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
        document.getElementById("loginUsername").value = "";
        document.getElementById("loginPassword").value = "";
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function checkSession() {
        const saved = localStorage.getItem("cinema_currentUser");
        if (saved) {
            const userData = JSON.parse(saved);
            const user = USERS_LIST.find(u => u.username === userData.username);
            if (user) {
                currentUser = user;
                showMainPage();
                return;
            }
        }
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
    }
    
    checkSession();
</script>
</body>
</html>
