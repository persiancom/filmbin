<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Cinema | سریال‌خانه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 10%, #0a0000 0%, #1a0101 50%, #000000 100%);
            font-family: 'Segoe UI', 'Poppins', Tahoma, sans-serif;
            padding: 30px 20px;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 50px 20px;
            margin-bottom: 50px;
            background: linear-gradient(135deg, rgba(180, 20, 30, 0.2), rgba(0, 0, 0, 0.6));
            border-radius: 60px;
            border: 1px solid rgba(220, 40, 50, 0.5);
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff2d2d, #8b0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        .sub {
            color: #ff7777;
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            justify-content: center;
        }

        .filter-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #ff3333;
            padding: 10px 28px;
            border-radius: 50px;
            color: #ffaaaa;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            font-size: 1rem;
        }

        .filter-btn.active {
            background: #cc0000;
            color: white;
            border-color: #ff7777;
            box-shadow: 0 0 15px #ff0000;
        }

        .filter-btn:hover {
            background: #aa0000;
            color: white;
            transform: scale(1.02);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }

        .card {
            background: linear-gradient(145deg, #0f0505, #1a0808);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid #ff2a2a40;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #ff3333;
            box-shadow: 0 20px 35px rgba(255, 0, 0, 0.3);
        }

        .card-img {
            width: 100%;
            height: 420px;
            background: linear-gradient(115deg, #2a0505, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover .card-img img {
            transform: scale(1.05);
        }

        .card-img::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, #0f0505, transparent);
            pointer-events: none;
        }

        .card-content {
            padding: 22px;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffcccc;
        }

        .card-type {
            display: inline-block;
            background: #cc0000;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 18px;
            box-shadow: 0 0 8px #ff0000;
        }

        .card-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download {
            background: #b91c1c;
            color: white;
            border: 1px solid #ff6666;
        }

        .btn-download:hover {
            background: #ff2a2a;
            transform: scale(1.02);
            box-shadow: 0 0 12px red;
        }

        .btn-watch {
            background: #2d0a0a;
            color: #ff8888;
            border: 1px solid #aa3333;
        }

        .btn-watch:hover {
            background: #4a1515;
            color: white;
            border-color: #ff5555;
        }

        .footer {
            text-align: center;
            margin-top: 70px;
            padding: 25px;
            color: #992222;
            font-size: 0.75rem;
            border-top: 1px solid #330000;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a0101;
        }
        ::-webkit-scrollbar-thumb {
            background: #cc0000;
            border-radius: 10px;
        }

        @media (max-width: 750px) {
            .movies-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
            body {
                padding: 15px;
            }
            .card-img {
                height: 350px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✦ VOID CINEMA ✦</h1>
        <div class="sub">دانلود با سرعت | تماشای آنلاین</div>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">🔥 همه</button>
        <button class="filter-btn" data-filter="سریال">📺 سریال‌ها</button>
    </div>

    <div id="moviesGrid" class="movies-grid"></div>

    <div class="footer">
        © برای استفاده شخصی روی تلویزیون و اشتراک با دوستان
    </div>
</div>

<script>
    // =========================================
    // ✅ لیست سریال‌ها با عکس (لینک‌ها خالی - خودت پر کن)
    // =========================================
    const moviesData = [
        {
            id: 1,
            title: "سریال گل سنگ",
            type: "سریال",
            image: "https://zardfilm.in/wp-content/uploads/2026/04/episode-2-gole--500x706.webp",
            downloadLink: "",
            watchLink: ""
        },
        {
            id: 2,
            title: "سریال بی عاطفه",
            type: "سریال",
            image: "https://zbcdn.cloud/files/cache/67480_69aa6bb103d5c1b228294640.4ac18b.jpg",
            downloadLink: "",
            watchLink: ""
        },
        {
            id: 3,
            title: "سریال بیست و یک",
            type: "سریال",
            image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQPnQWgP4VBNgnXCM_RbsWnGW0NohgRNdxbZxG4zPZWc53wv9tD8s2h4pk&s=10",
            downloadLink: "",
            watchLink: ""
        },
        {
            id: 4,
            title: "سریال هزار و یک شب",
            type: "سریال",
            image: "https://api2.filmzi.com/media/1001nights-poster-main-6947954d755a8b03beedfad2?w=1920&q=80",
            downloadLink: "",
            watchLink: ""
        },
        {
            id: 5,
            title: "سریال بدنام",
            type: "سریال",
            image: "https://static.cdn.asset.filimo.com/flmt/mov_174988_343591.jpg?width=300&quality=85&sharpen=80&secret=ZaRTIhChiq5rD660aRzxNw",
            downloadLink: "",
            watchLink: ""
        },
        {
            id: 6,
            title: "سریال مو به مو",
            type: "سریال",
            image: "",
            downloadLink: "",
            watchLink: ""
        },
        {
            id: 7,
            title: "سریال From",
            type: "سریال",
            image: "https://cdn.paraj.ir/images/66acd8101cecfa327abce7b7?w=3840&q=100",
            downloadLink: "",
            watchLink: ""
        }
    ];

    // ---------- کد نمایش - نیازی به تغییر نیست ----------
    let currentFilter = "all";

    function renderMovies() {
        const grid = document.getElementById("moviesGrid");
        if (!grid) return;
        
        let filtered = currentFilter === "all" ? moviesData : moviesData.filter(m => m.type === currentFilter);
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div style="text-align:center; grid-column:1/-1; padding:60px; background:#0f0505; border-radius:40px; border:1px solid red;">⚠️ محتوایی یافت نشد</div>`;
            return;
        }
        
        grid.innerHTML = filtered.map(movie => {
            const hasWatch = movie.watchLink && movie.watchLink.trim() !== "";
            const hasDownload = movie.downloadLink && movie.downloadLink.trim() !== "";
            const posterUrl = movie.image && movie.image.trim() !== "" ? movie.image : "https://placehold.co/500x700/1a0808/cc0000?text=No+Poster";
            
            return `
                <div class="card">
                    <div class="card-img">
                        <img src="${escapeHtml(posterUrl)}" alt="${escapeHtml(movie.title)}" loading="lazy" onerror="this.src='https://placehold.co/500x700/1a0808/cc0000?text=Poster+Not+Found'">
                    </div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(movie.title)}</div>
                        <div class="card-type">سریال</div>
                        <div class="card-links">
                            ${hasDownload ? `<a href="${escapeHtml(movie.downloadLink)}" class="btn btn-download" target="_blank">⬇️ دانلود مستقیم</a>` : '<span style="color:#883333; padding:8px 0; display:inline-block;">⏳ لینک دانلود به زودی</span>'}
                            ${hasWatch ? `<a href="${escapeHtml(movie.watchLink)}" class="btn btn-watch" target="_blank">▶️ پخش آنلاین</a>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join("");
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function setupFilters() {
        const btns = document.querySelectorAll(".filter-btn");
        btns.forEach(btn => {
            btn.addEventListener("click", function() {
                btns.forEach(b => b.classList.remove("active"));
                this.classList.add("active");
                currentFilter = this.getAttribute("data-filter");
                renderMovies();
            });
        });
    }
    
    renderMovies();
    setupFilters();
</script>
</body>
</html>
