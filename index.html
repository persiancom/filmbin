            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0000 0%, #3a0000 25%, #1a0000 50%, #4a0000 75%, #1a0000 100%);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            color: #fff;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .login-box {
            background: rgba(30, 10, 10, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 80, 80, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 0, 0, 0.15);
            text-align: center;
        }

        .login-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 25px;
            overflow: hidden;
            border: 2px solid rgba(255, 80, 80, 0.6);
            background: rgba(20, 8, 8, 0.8);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-box h2 {
            background: linear-gradient(135deg, #ffaaaa, #ff6666);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffaaaa;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(40, 20, 20, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 80, 80, 0.3);
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            background: rgba(60, 25, 25, 0.6);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #cc0000, #8b0000);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.3);
        }

        .error-msg {
            color: #ff8888;
            margin-top: 15px;
            font-size: 0.8rem;
        }

        .app-page {
            display: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        .main-header {

            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(255, 70, 70, 0.25);
        }

        .user-info {
            display: flex;
            align-items: center;

        }

        .user-info span {
            font-size: 0.8rem;
            color: #ffaaaa;
        }

        .user-info strong {

            background: linear-gradient(135deg, #ffcccc, #ff8888);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: rgba(50, 20, 20, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 80, 80, 0.3);
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffaaaa;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;

        .logout-btn:hover {
            background: rgba(80, 30, 30, 0.8);
            border-color: #ff5555;
            color: white;
        }

        .hero-banner {
            margin-bottom: 20px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .hero-banner img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
        }

        .hero-text {
            text-align: center;
            margin-top: -35px;
            position: relative;
            z-index: 2;
            padding-bottom: 15px;
        }

        .hero-text h2 {
            background: linear-gradient(135deg, #ffcc66, #ff9933);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(255, 153, 0, 0.2);
        }

        .category-tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: rgba(30, 15, 15, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 80, 80, 0.3);
            padding: 8px 28px;
            border-radius: 40px;
            color: #ffbbbb;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .category-btn.active {
            background: linear-gradient(135deg, #cc0000, #8b0000);
            color: white;
            border-color: #ff7777;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .category-btn:hover {
            transform: translateY(-2px);
            background: rgba(80, 30, 30, 0.7);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
            margin-top: 20px;
            align-items: start;
        }

        .card {
            background: rgba(20, 10, 10, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 70, 70, 0.25);

            flex-direction: column;
            height: 100%;

            transform: translateY(-5px);
            border-color: rgba(255, 80, 80, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 2 / 2.8;
            overflow: hidden;
            flex-shrink: 0;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-img img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #ffdddd;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episodes-dropdown {
            background: rgba(30, 15, 15, 0.5);
            border-radius: 14px;
            overflow: hidden;
            margin-top: auto;
        }

        .dropdown-header {
            background: rgba(40, 20, 20, 0.6);
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffbbbb;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .dropdown-header:hover {
            background: rgba(60, 30, 30, 0.8);
            color: white;
        }

        .dropdown-arrow {
            transition: transform 0.25s ease;
            font-size: 0.7rem;
        }

        .dropdown-arrow.open {
            transform: rotate(180deg);
        }

        .dropdown-content {
            max-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            transition: max-height 0.3s ease-out;
            background: rgba(15, 8, 8, 0.9);
        }

        .dropdown-content.show {
            max-height: 260px;
        }

        .dropdown-content::-webkit-scrollbar {
            width: 3px;
        }

        .dropdown-content::-webkit-scrollbar-track {
            background: #2a1010;
            border-radius: 4px;
        }

        .dropdown-content::-webkit-scrollbar-thumb {
            background: #cc3333;
            border-radius: 4px;
        }

        .episode-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid rgba(255, 70, 70, 0.15);

            flex-wrap: wrap;

        .episode-name {

            color: #ffcccc;
            flex: 1;

        .episode-buttons {
            display: flex;
            gap: 6px;
        }

            border: 1px solid rgba(80, 180, 80, 0.5);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            color: #ccffcc;
            transition: all 0.2s;

        .play-btn:hover {
            background: rgba(50, 140, 50, 1);
            transform: scale(1.02);
            border-color: #66ff66;
            color: white;
        }

        .download-badge {
            background: rgba(180, 40, 40, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 80, 80, 0.5);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            text-decoration: none;
            color: #ffcccc;
            transition: all 0.2s;
            display: inline-block;
        }

        .download-badge:hover {
            background: rgba(220, 50, 50, 1);
            transform: scale(1.02);
            border-color: #ff6666;
            color: white;
        }

            background: rgba(80, 40, 40, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(180, 80, 80, 0.3);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            color: #aa8888;
        }

        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .video-modal-content {
            width: 90%;
            max-width: 1100px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
        }

        .close-video {
            position: absolute;
            top: -45px;
            right: -10px;
            color: white;
            font-size: 32px;
            cursor: pointer;
            background: none;
            border: none;
            opacity: 0.7;
            transition: all 0.2s;
            z-index: 2001;
        }

        .close-video:hover {
            opacity: 1;
            color: #ff4444;
        }

        .video-title {
            position: absolute;
            top: -40px;
            left: 10px;
            color: #ffcc99;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 2001;
        }

        .plyr {
            border-radius: 16px;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #aa7755;
            border-top: 1px solid rgba(255, 80, 80, 0.2);
            font-size: 0.7rem;
        }

        @media (max-width: 768px) {
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
                gap: 12px;
            }
            .card-title {
                font-size: 0.8rem;
            }
            .episode-name {
                font-size: 0.65rem;
            }
            .play-btn, .download-badge {
                padding: 3px 8px;
                font-size: 0.6rem;
            }
            .dropdown-content.show {
                max-height: 200px;
            }
        }
    </style>
</head>

    let currentUser = null;
    let currentCategory = "iranian";
    let currentPlayer = null;

    function filterMovies(category) {
        currentCategory = category;
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-category') === category);
        });
        renderMovies();
    }

    function playVideo(url, title) {
        const modal = document.getElementById("videoModal");
        const videoElement = document.getElementById("my-video");
        const titleElement = document.getElementById("videoTitle");
        
        // تنظیم عنوان
        titleElement.innerHTML = title;
        
        // اگر پلیر قبلی وجود داشت، نابودش کن
        if (currentPlayer) {
            currentPlayer.destroy();
            currentPlayer = null;
        }
        
        // تنظیم منبع ویدیو
        videoElement.src = url;
        
        // ساخت پلیر جدید با تنظیمات کامل
        currentPlayer = new Plyr(videoElement, {
            controls: [
                'play', 'progress', 'current-time', 'duration',
                'mute', 'volume', 'captions', 'settings',
                'pip', 'airplay', 'fullscreen'
            ],
            settings: ['captions', 'quality', 'speed'],
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
            quality: { default: 720, options: [480, 720, 1080] },
            invertTime: false,
            autoplay: true,
            muted: false
        });
        
        // نمایش مودال
        modal.style.display = "flex";
        
        // پخش خودکار
        currentPlayer.play();
        
        // رویداد خطا
        currentPlayer.on('error', function(event) {
            console.error('خطا در پخش:', event);
            alert('خطا در پخش ویدیو! ممکن است لینک معتبر نباشد.');
        });
    }
    
    function closeVideoPlayer() {
        const modal = document.getElementById("videoModal");
        if (currentPlayer) {
            currentPlayer.pause();
            currentPlayer.destroy();
            currentPlayer = null;
        }
        const videoElement = document.getElementById("my-video");
        videoElement.src = "";
        modal.style.display = "none";
    }

    function renderMovies() {
        const grid = document.getElementById("moviesGrid");
        if (!grid) return;
        
        const filteredMovies = moviesData.filter(movie => movie.category === currentCategory);
        
        if (filteredMovies.length === 0) {
            grid.innerHTML = `<div style="text-align:center; grid-column:1/-1; padding:50px; background:rgba(30,10,10,0.3); backdrop-filter:blur(10px); border-radius:25px;">🎬 در این دسته سریالی وجود ندارد</div>`;
            return;
        }
        
        grid.innerHTML = filteredMovies.map((movie, movieIndex) => {
            const hasValidEpisodes = movie.episodes && movie.episodes.length > 0;
            const uniqueId = `dropdown-${movie.id}-${movieIndex}`;
            
            return `
                <div class="card">
                    <div class="card-img">
                        <img src="${movie.image}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/500x700/1a0808/cc0000?text=No+Poster'">
                    </div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(movie.title)}</div>
                        ${hasValidEpisodes ? `
                            <div class="episodes-dropdown">
                                <div class="dropdown-header" onclick="toggleDropdown(this, '${uniqueId}')">
                                    <span>📥 لینک‌ها</span>
                                    <span class="dropdown-arrow">▼</span>
                                </div>
                                <div class="dropdown-content" id="${uniqueId}">
                                    ${movie.episodes.map(ep => `
                                        <div class="episode-link">
                                            <span class="episode-name">${escapeHtml(ep.name)}</span>
                                            <div class="episode-buttons">
                                                ${ep.url ? `<button class="play-btn" onclick="playVideo('${escapeHtml(ep.url)}', '${escapeHtml(movie.title)} - ${escapeHtml(ep.name)}')">▶ پخش</button>` : ''}
                                                ${ep.url ? `<a href="${escapeHtml(ep.url)}" class="download-badge" target="_blank">📥 دانلود</a>` : '<span class="soon-badge">به زودی</span>'}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : '<div style="color:#886666; font-size:0.7rem; text-align:center; padding:8px;">⏳ به زودی</div>'}
                    </div>
                </div>
            `;
        }).join("");
    }
    
    function toggleDropdown(header, dropdownId) {
        const allDropdownContents = document.querySelectorAll('.dropdown-content');
        const allDropdownArrows = document.querySelectorAll('.dropdown-arrow');
        const currentContent = document.getElementById(dropdownId);
        const currentArrow = header.querySelector('.dropdown-arrow');
        
        if (currentContent && currentContent.classList.contains('show')) {
            currentContent.classList.remove('show');
            currentArrow.classList.remove('open');
        } else {
            allDropdownContents.forEach(content => content.classList.remove('show'));
            allDropdownArrows.forEach(arrow => arrow.classList.remove('open'));
            if (currentContent) {
                currentContent.classList.add('show');
                currentArrow.classList.add('open');
            }
        }
    }
    
    function attemptLogin() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;
        const user = USERS_LIST.find(u => u.username === username && u.password === password);
        
        if (user) {
            currentUser = user;
            localStorage.setItem("cinema_currentUser", JSON.stringify({ username: user.username }));
            showMainPage();
        } else {
            document.getElementById("loginError").innerText = "❌ نام کاربری یا رمز عبور اشتباه است";
        }
    }
    
    function showMainPage() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";
        document.getElementById("currentUserDisplay").innerHTML = currentUser.username;
        renderMovies();
    }
    
    function logout() {
        if (currentPlayer) {
            currentPlayer.destroy();
            currentPlayer = null;
        }
        currentUser = null;
        localStorage.removeItem("cinema_currentUser");
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
        document.getElementById("loginUsername").value = "";
        document.getElementById("loginPassword").value = "";
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function checkSession() {
        const saved = localStorage.getItem("cinema_currentUser");
        if (saved) {
            const userData = JSON.parse(saved);
            const user = USERS_LIST.find(u => u.username === userData.username);
            if (user) {
                currentUser = user;
                showMainPage();
                return;
            }
        }
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
    }
    
    checkSession();
</script>
</body>
</html>
