<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>سینما خانگی | دانلود فیلم و سریال</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0000 0%, #3a0000 25%, #1a0000 50%, #4a0000 75%, #1a0000 100%);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            font-family: 'Segoe UI', 'Poppins', Tahoma, sans-serif;
            min-height: 100vh;
            color: #fff;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* صفحه ورود */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .login-box {
            background: rgba(30, 10, 10, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 60, 60, 0.5);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
            text-align: center;
        }

        .login-logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 30px;
            overflow: hidden;
            border: 3px solid #cc0000;
            background: #1a0808;
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-box h2 {
            color: #ff8888;
            margin-bottom: 35px;
            font-size: 2rem;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #ffaaaa;
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(50, 20, 20, 0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #cc3333;
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #cc0000;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 15px;
        }

        .login-btn:hover {
            background: #ff1a1a;
            transform: scale(1.02);
        }

        .error-msg {
            color: #ff6666;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        /* هدر اصلی - دکمه‌های کوچک و جمع‌وجور */
        .main-header {
            background: rgba(30, 10, 10, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 12px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid rgba(255, 50, 50, 0.4);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .user-info span {
            font-size: 0.85rem;
        }

        .user-info strong {
            font-size: 0.9rem;
        }

        .admin-link-btn {
            background: #cc0000;
            border: none;
            padding: 6px 16px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .admin-link-btn:hover {
            background: #ff1a1a;
            transform: scale(1.02);
        }

        .logout-btn {
            background: rgba(50, 20, 20, 0.7);
            border: 1px solid #cc3333;
            padding: 6px 16px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75rem;
        }

        .logout-btn:hover {
            background: #4a1515;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* بنر */
        .hero-banner {
            margin-bottom: 30px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero-banner img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
        }

        .hero-text {
            text-align: center;
            margin-top: -50px;
            position: relative;
            z-index: 2;
            padding-bottom: 25px;
        }

        .hero-text h2 {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.5rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            font-weight: bold;
        }

        /* دکمه‌های دسته‌بندی */
        .category-tabs {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: rgba(30, 10, 10, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #cc3333;
            padding: 10px 30px;
            border-radius: 50px;
            color: #ffaaaa;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .category-btn.active {
            background: #cc0000;
            color: white;
            border-color: #ff7777;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .category-btn:hover {
            background: #aa0000;
            color: white;
            transform: scale(1.02);
        }

        /* گرید کارت‌ها */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: rgba(30, 10, 10, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 60, 60, 0.4);
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #ff5555;
            box-shadow: 0 15px 35px rgba(255, 0, 0, 0.25);
            background: rgba(40, 15, 15, 0.55);
        }

        .card-img {
            width: 100%;
            height: 400px;
            overflow: hidden;
            position: relative;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover .card-img img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffcccc;
        }

        /* منوی کشویی قسمتها */
        .episodes-section {
            margin-top: 10px;
        }

        .episodes-dropdown {
            background: rgba(40, 15, 15, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 50, 50, 0.4);
            border-radius: 12px;
            margin-top: 10px;
            overflow: hidden;
        }

        .dropdown-header {
            background: rgba(50, 15, 15, 0.7);
            padding: 10px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #ffaaaa;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .dropdown-header:hover {
            background: rgba(80, 25, 25, 0.8);
            color: #ffcccc;
        }

        .dropdown-arrow {
            transition: transform 0.3s ease;
            font-size: 1rem;
        }

        .dropdown-arrow.open {
            transform: rotate(180deg);
        }

        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: rgba(25, 8, 8, 0.7);
        }

        .dropdown-content.show {
            max-height: 500px;
            transition: max-height 0.5s ease-in;
        }

        .episode-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-top: 1px solid rgba(255, 50, 50, 0.2);
            text-decoration: none;
            color: #ffcccc;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .episode-link:hover {
            background: rgba(60, 20, 20, 0.8);
            color: #ff8888;
            padding-right: 22px;
        }

        .episode-name {
            font-size: 0.85rem;
        }

        .download-badge {
            background: #b91c1c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 70px;
            padding: 30px;
            color: #ffaa33;
            border-top: 1px solid rgba(255, 50, 50, 0.3);
            font-size: 0.85rem;
        }

        /* پنل ادمین */
        .admin-page {
            display: none;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            background: rgba(30, 10, 10, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 50, 50, 0.4);
        }

        .admin-header h3 {
            font-size: 1.1rem;
        }

        .admin-panel-box {
            background: rgba(30, 10, 10, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255, 50, 50, 0.4);
        }

        .users-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 50, 50, 0.2);
        }

        th {
            color: #ffaaaa;
            font-weight: bold;
            font-size: 0.85rem;
        }

        td {
            font-size: 0.85rem;
        }

        .back-to-site {
            background: rgba(50, 20, 20, 0.7);
            border: 1px solid #cc3333;
            padding: 6px 18px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75rem;
        }

        .back-to-site:hover {
            background: #4a1515;
        }

        @media (max-width: 768px) {
            .movies-grid {
                grid-template-columns: 1fr;
            }
            .hero-text h2 {
                font-size: 1.1rem;
            }
            .login-box {
                padding: 35px 25px;
                margin: 0 15px;
            }
            .category-btn {
                padding: 6px 18px;
                font-size: 0.85rem;
            }
            .main-header {
                padding: 10px 18px;
            }
        }

        @media (min-width: 1920px) {
            .login-container {
                max-width: 600px;
            }
            .login-box {
                padding: 60px 50px;
            }
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <img src="https://github.com/persiancom/filmbin/blob/main/file_000000007c1071fbadfcb33b99bad87e.png?raw=true" alt="Logo" loading="eager">
            </div>
            <h2>ورود به سینما</h2>
            <div class="input-group">
                <label>نام کاربری</label>
                <input type="text" id="loginUsername" placeholder="نام کاربری خود را وارد کنید">
            </div>
            <div class="input-group">
                <label>رمز عبور</label>
                <input type="password" id="loginPassword" placeholder="رمز عبور">
            </div>
            <button class="login-btn" onclick="attemptLogin()">ورود</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>
</div>

<div id="appPage" class="app-page" style="display: none;">
    <div class="container">
        <div class="main-header">
            <div class="user-info">
                <span>خوش آمدی،</span>
                <strong id="currentUserDisplay"></strong>
                <button id="adminPanelBtn" class="admin-link-btn" style="display: none;" onclick="showAdminPage()">👑 پنل مدیریت</button>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 خروج</button>
        </div>

        <div class="hero-banner">
            <img src="https://github.com/persiancom/filmbin/blob/main/file_00000000d35471fb9298f545464b46f0.png?raw=true" alt="Hero Banner" loading="eager">
        </div>
        <div class="hero-text">
            <h2>✨ دانلود و تماشای فیلم و سریال ایرانی و خارجی ✨</h2>
        </div>

        <!-- دکمه‌های دسته‌بندی ایرانی / خارجی -->
        <div class="category-tabs">
            <button class="category-btn active" data-category="iranian" onclick="filterMovies('iranian')">🇮🇷 سریال‌های ایرانی</button>
            <button class="category-btn" data-category="foreign" onclick="filterMovies('foreign')">🌍 سریال‌های خارجی</button>
        </div>

        <div id="moviesGrid" class="movies-grid"></div>

        <div class="footer">
            🎬 تهیه شده توسط Hamidreza
        </div>
    </div>
</div>

<div id="adminPage" class="admin-page">
    <div class="admin-container">
        <div class="admin-header">
            <h3>👑 پنل مدیریت - گزارش ورود کاربران</h3>
            <button class="back-to-site" onclick="showMainPage()">↩️ بازگشت به سایت</button>
        </div>
        
        <div class="admin-panel-box">
            <div class="users-table">
                <table>
                    <thead>
                        <tr><th>نام کاربری</th><th>نوع کاربر</th><th>آخرین زمان ورود</th></tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ✅ لینک فیلم و سریال ها با دسته‌بندی ایرانی/خارجی
    // ==========================================
    let moviesData = [
        // سریال‌های ایرانی
        {
            id: 1,
            title: "سریال گل سنگ",
            category: "iranian",
            image: "https://zardfilm.in/wp-content/uploads/2026/04/episode-2-gole--500x706.webp",
            episodes: [
                { name: "قسمت 1", url: "https://cf.linkulu.com/dl/6a2163946a48881ec0942904" },
                { name: "قسمت 2", url: "" },
                { name: "قسمت 3", url: "" }
            ]
        },
        {
            id: 2,
            title: "سریال بی عاطفه",
            category: "iranian",
            image: "https://zbcdn.cloud/files/cache/67480_69aa6bb103d5c1b228294640.4ac18b.jpg",
            episodes: [
                { name: "قسمت 14", url: "https://cf.linkulu.com/dl/6a228f5f6a48881ec0944b25" },
            ]
        },
        {
            id: 3,
            title: "سریال بیست و یک",
            category: "iranian",
            image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQPnQWgP4VBNgnXCM_RbsWnGW0NohgRNdxbZxG4zPZWc53wv9tD8s2h4pk&s=10",
            episodes: [
                { name: "فیلم کامل", url: "https://cf.linkulu.com/dl/6a2192cd6a48881ec0942d8e" }
            ]
        },
        {
            id: 4,
            title: "سریال هزار و یک شب",
            category: "iranian",
            image: "https://api2.filmzi.com/media/1001nights-poster-main-6947954d755a8b03beedfad2?w=1920&q=80",
            episodes: [
                { name: "قسمت 1", url: "" },
                { name: "قسمت 2", url: "" }
            ]
        },
        {
            id: 5,
            title: "سریال بدنام",
            category: "iranian",
            image: "https://static.cdn.asset.filimo.com/flmt/mov_174988_343591.jpg?width=300&quality=85&sharpen=80&secret=ZaRTIhChiq5rD660aRzxNw",
            episodes: [
                { name: "قسمت 9", url: "https://cf.linkulu.com/dl/6a22905a6a48881ec0944b43" },
            ]
        },
        {
            id: 6,
            title: "سریال مو به مو",
            category: "iranian",
            image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRkX72DwIPWEuz_0ETODdFnEM_HBYcq4VN9MjpdH1pZ8ipW5-sItCTQTUlI&s=10",
            episodes: [
                { name: "قسمت 1", url: "" },
                { name: "قسمت 2", url: "" }
            ]
        },
        // سریال‌های خارجی
        {
            id: 7,
            title: "سریال From",
            category: "foreign",
            image: "https://cdn.paraj.ir/images/66acd8101cecfa327abce7b7?w=3840&q=100",
            episodes: [
                { name: "فصل 1 - قسمت 1", url: "" },
                { name: "فصل 1 - قسمت 2", url: "" }
            ]
        },
        {
            id: 8,
            title: "سریال بوروها 2026",
            category: "foreign",
            image: "https://static.cdn.asset.filimo.com/flmt/mov_175972_344155.jpg?width=300&quality=85&sharpen=80&secret=vhtlGHyWzzhfsjPrUDybIA",
            episodes: [
                { name: "قسمت اول", url: "https://mci.uptv.ir/uptv/serial5/The%20Boroughs/1/1780616The.Boroughs.S01.E01.720p.Sub_UPTV.co178061694.mkv?1780616943" },
                { name: "قسمت دوم", url: "https://mci.uptv.ir/uptv/serial5/The%20Boroughs/1/1780618The.Boroughs.S01.E02.720p.Sub_UPTV.co178061890.mkv?1780618905" },
                { name: "قسمت سوم", url: "https://mci.uptv.ir/uptv/serial5/The%20Boroughs/1/1780619The.Boroughs.S01.E03.720p.Sub_UPTV.co178061925.mkv?1780619254" },
                { name: "قسمت چهارم", url: "https://mci.uptv.ir/uptv/serial5/The%20Boroughs/1/1780619The.Boroughs.S01.E04.720p.Sub_UPTV.co178061927.mkv?1780619276" },
                { name: "قسمت پنجم", url: "https://mci.uptv.ir/uptv/serial5/The%20Boroughs/1/1780619The.Boroughs.S01.E05.720p.Sub_UPTV.co178061929.mkv?1780619299" },
                { name: "قسمت ششم", url: "https://mci.uptv.ir/uptv/serial5/The%20Boroughs/1/1780619The.Boroughs.S01.E06.720p.Sub_UPTV.co178061937.mkv?1780619375" },
                { name: "قسمت هفتم", url: "https://mci.uptv.ir/uptv/serial5/The%20Boroughs/1/1780619The.Boroughs.S01.E07.720p.Sub_UPTV.co178061939.mkv?1780619392" },
                { name: "قسمت هشتم", url: "https://mci.uptv.ir/uptv/serial5/The%20Boroughs/1/1780619The.Boroughs.S01.E08.720p.Sub_UPTV.co178061941.mkv?1780619410" },
            ]
        }
     ];   

    // ==========================================
    // ✅ لیست کاربران
    // ==========================================
    let users = [
        { username: "حمیدرضا", password: "CTF_22", role: "admin", lastLogin: "" },
        { username: "TV", password: "CTF22", role: "user", lastLogin: "" }
    ];

    let currentUser = null;
    let currentCategory = "iranian";

    // ========== توابع ==========
    function loadUsers() {
        const savedLastLogins = localStorage.getItem("cinema_lastLogins");
        if (savedLastLogins) {
            const lastLogins = JSON.parse(savedLastLogins);
            users.forEach(user => {
                if (lastLogins[user.username]) {
                    user.lastLogin = lastLogins[user.username];
                }
            });
        }
    }

    function saveLastLogins() {
        const lastLogins = {};
        users.forEach(user => {
            if (user.lastLogin) {
                lastLogins[user.username] = user.lastLogin;
            }
        });
        localStorage.setItem("cinema_lastLogins", JSON.stringify(lastLogins));
    }

    function updateLastLogin(username) {
        const user = users.find(u => u.username === username);
        if (user) {
            const now = new Date();
            user.lastLogin = `${now.toLocaleDateString('fa-IR')} - ${now.toLocaleTimeString('fa-IR')}`;
            saveLastLogins();
        }
    }

    // فیلتر کردن فیلم‌ها بر اساس دسته‌بندی
    function filterMovies(category) {
        currentCategory = category;
        
        // بروزرسانی کلاس active دکمه‌ها
        document.querySelectorAll('.category-btn').forEach(btn => {
            if (btn.getAttribute('data-category') === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        renderMovies();
    }

    function renderMovies() {
        const grid = document.getElementById("moviesGrid");
        if (!grid) return;
        
        const filteredMovies = moviesData.filter(movie => movie.category === currentCategory);
        
        if (filteredMovies.length === 0) {
            grid.innerHTML = `<div style="text-align:center; grid-column:1/-1; padding:60px; background:rgba(30,10,10,0.5); backdrop-filter:blur(10px); border-radius:30px;">🎬 در این دسته سریالی وجود ندارد</div>`;
            return;
        }
        
        grid.innerHTML = filteredMovies.map(movie => {
            const hasValidEpisodes = movie.episodes && movie.episodes.length > 0;
            
            return `
                <div class="card">
                    <div class="card-img">
                        <img src="${movie.image}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/500x700/1a0808/cc0000?text=No+Poster'">
                    </div>
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(movie.title)}</div>
                        
                        ${hasValidEpisodes ? `
                            <div class="episodes-section">
                                <div class="episodes-dropdown">
                                    <div class="dropdown-header" onclick="toggleDropdown(this)">
                                        <span>📥 لینک‌های دانلود</span>
                                        <span class="dropdown-arrow">▼</span>
                                    </div>
                                    <div class="dropdown-content">
                                        ${movie.episodes.map(ep => `
                                            <a href="${ep.url ? escapeHtml(ep.url) : '#'}" 
                                               class="episode-link" 
                                               ${ep.url ? 'target="_blank"' : 'style="opacity:0.6; cursor:not-allowed;" onclick="return false;"'}>
                                                <span class="episode-name">${escapeHtml(ep.name)}</span>
                                                ${ep.url ? '<span class="download-badge">دانلود ⬇️</span>' : '<span class="download-badge" style="background:#442222;">به زودی</span>'}
                                            </a>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        ` : '<span style="color:#883333; display:block; padding:10px 0;">⏳ لینک‌ها به زودی اضافه می‌شوند</span>'}
                    </div>
                </div>
            `;
        }).join("");
    }
    
    // تابع باز و بسته شدن منوی کشویی
    function toggleDropdown(header) {
        const content = header.nextElementSibling;
        const arrow = header.querySelector('.dropdown-arrow');
        
        if (content.classList.contains('show')) {
            content.classList.remove('show');
            arrow.classList.remove('open');
        } else {
            content.classList.add('show');
            arrow.classList.add('open');
        }
    }
    
    function renderUsersTable() {
        const tbody = document.getElementById("usersTableBody");
        if (!tbody) return;
        
        tbody.innerHTML = "";
        users.forEach(user => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = user.username;
            row.insertCell(1).innerText = user.role === "admin" ? "مدیر" : "کاربر";
            row.insertCell(2).innerText = user.lastLogin || "هنوز وارد نشده";
        });
    }
    
    // ========== توابع اصلی ==========
    function attemptLogin() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;
        const user = users.find(u => u.username === username && u.password === password);
        
        if (user) {
            currentUser = user;
            updateLastLogin(username);
            localStorage.setItem("cinema_currentUser", JSON.stringify({ username: user.username, role: user.role }));
            showMainPage();
        } else {
            document.getElementById("loginError").innerText = "❌ نام کاربری یا رمز عبور اشتباه است";
        }
    }
    
    function showMainPage() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";
        document.getElementById("adminPage").style.display = "none";
        document.getElementById("currentUserDisplay").innerText = currentUser.username;
        
        const adminBtn = document.getElementById("adminPanelBtn");
        adminBtn.style.display = currentUser.role === "admin" ? "inline-block" : "none";
        
        // ریست کردن به دسته ایرانی
        currentCategory = "iranian";
        document.querySelectorAll('.category-btn').forEach(btn => {
            if (btn.getAttribute('data-category') === "iranian") {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        renderMovies();
    }
    
    function showAdminPage() {
        if (currentUser.role !== "admin") return;
        document.getElementById("appPage").style.display = "none";
        document.getElementById("adminPage").style.display = "block";
        renderUsersTable();
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("cinema_currentUser");
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
        document.getElementById("adminPage").style.display = "none";
        document.getElementById("loginUsername").value = "";
        document.getElementById("loginPassword").value = "";
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function checkSession() {
        loadUsers();
        const saved = localStorage.getItem("cinema_currentUser");
        if (saved) {
            const userData = JSON.parse(saved);
            const user = users.find(u => u.username === userData.username && u.role === userData.role);
            if (user) {
                currentUser = user;
                showMainPage();
                return;
            }
        }
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
        document.getElementById("adminPage").style.display = "none";
    }
    
    checkSession();
</script>
</body>
</html>
