    let currentUser = null;

    // تشخیص دستگاه
    function getDeviceType() {
        const ua = navigator.userAgent;
        if (/Android|webOS|iPhone|iPad|iPod/i.test(ua)) return "📱 موبایل";
        if (/SmartTV|AppleTV|GoogleTV|Roku|Netflix|LGTV|SamsungTV|Tizen|WebOS/i.test(ua)) return "📺 تلویزیون";
        return "💻 کامپیوتر";
    }

    // دریافت داده از سرور
    async function fetchFromServer() {
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": API_KEY }
            });
            const data = await response.json();
            return data.record || { users: {}, messages: [] };
        } catch (error) {
            console.error("خطا در دریافت:", error);
            return { users: {}, messages: [] };
        }
    }

    // ذخیره در سرور
    async function saveToServer(data) {
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify(data)
            });
            return true;
        } catch (error) {
            console.error("خطا در ذخیره:", error);
            return false;
        }
    }

    // همگام‌سازی کاربران جدید
    async function syncUsers() {
        const record = await fetchFromServer();
        let changed = false;
        
        for (const user of USERS_LIST) {
            if (!record.users[user.username]) {
                record.users[user.username] = {
                    lastLogin: "",
                    lastDevice: "",
                    online: false,
                    lastSeen: 0
                };
                changed = true;
            }
        }
        
        if (!record.messages) {
            record.messages = [];
            changed = true;
        }
        
        if (changed) {
            await saveToServer(record);
        }
    }

    // بروزرسانی آخرین ورود
    async function updateLastLogin(username) {
        const now = new Date();
        const timeStr = `${now.toLocaleDateString('fa-IR')} ${now.toLocaleTimeString('fa-IR')}`;
        const device = getDeviceType();
        
        const record = await fetchFromServer();
        if (!record.users[username]) record.users[username] = {};
        
        record.users[username] = {
            ...record.users[username],
            lastLogin: timeStr,
            lastDevice: device,
            online: true,
            lastSeen: Date.now()
        };
        
        await saveToServer(record);
    }

    // بروزرسانی وضعیت آنلاین
    async function updateOnlineStatus() {
        if (!currentUser) return;
        const record = await fetchFromServer();
        if (record.users[currentUser.username]) {
            record.users[currentUser.username].online = true;
            record.users[currentUser.username].lastSeen = Date.now();
            await saveToServer(record);
        }
    }

    // خروج
    async function setOffline(username) {
        const record = await fetchFromServer();
        if (record.users[username]) {
            record.users[username].online = false;
            await saveToServer(record);
        }
    }

    // ارسال پیام
    async function sendMessage() {
        const messageText = document.getElementById("messageText").value.trim();
        if (!messageText) {
            alert("لطفاً پیام خود را بنویسید");
            return;
        }
        
        const now = new Date();
        const timeStr = `${now.toLocaleDateString('fa-IR')} ${now.toLocaleTimeString('fa-IR')}`;
        
        const record = await fetchFromServer();
        if (!record.messages) record.messages = [];
        
        record.messages.push({
            id: Date.now(),
            from: currentUser.username,
            message: messageText,
            time: timeStr,
            timestamp: Date.now(),
            read: false
        });
        
        await saveToServer(record);
        closeMessageModal();
        alert("✅ پیام شما با موفقیت ارسال شد");
    }

    // نمایش پیام‌ها
    async function renderMessagesTable() {
        const tbody = document.getElementById("messagesTableBody");
        if (!tbody) return;
        
        const record = await fetchFromServer();
        const messages = (record.messages || []).sort((a, b) => b.timestamp - a.timestamp);
        
        tbody.innerHTML = "";
        for (const msg of messages) {
            const row = tbody.insertRow();
            row.className = msg.read ? "" : "message-unread";
            row.insertCell(0).innerHTML = msg.from;
            row.insertCell(1).innerHTML = msg.time;
            row.insertCell(2).innerHTML = msg.message;
            row.insertCell(3).innerHTML = msg.read ? "✅ خوانده شده" : `<button class="mark-read-btn" onclick="markMessageAsRead(${msg.id})">خوانده شد</button>`;
        }
        
        const unreadCount = messages.filter(m => !m.read).length;
        const unreadSpan = document.getElementById("unreadCount");
        if (unreadSpan) {
            unreadSpan.innerHTML = unreadCount ? `(${unreadCount})` : "";
        }
    }

    // علامت خوانده شده
    async function markMessageAsRead(messageId) {
        const record = await fetchFromServer();
        const msg = record.messages.find(m => m.id === messageId);
        if (msg) {
            msg.read = true;
            await saveToServer(record);
            await renderMessagesTable();
        }
    }

    // نمایش کاربران
    async function renderUsersTable() {
        const tbody = document.getElementById("usersTableBody");
        if (!tbody) return;
        
        const record = await fetchFromServer();
        tbody.innerHTML = "";
        
        for (const user of USERS_LIST) {
            const data = record.users[user.username] || {};
            const lastSeen = data.lastSeen || 0;
            const isOnline = data.online === true && (Date.now() - lastSeen) < 60000; // 1 دقیقه
        
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = user.username;
            row.insertCell(1).innerHTML = user.role === "admin" ? "مدیر 👑" : "کاربر 👤";
            row.insertCell(2).innerHTML = isOnline ? '<span class="online-badge online"></span> آنلاین 🟢' : '<span class="online-badge offline"></span> آفلاین ⚫';
            row.insertCell(3).innerHTML = data.lastLogin || "هنوز وارد نشده";
        }
    }

    // تب پنل مدیریت
    async function showAdminTab(tab, btn) {
        document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById("usersTab").style.display = tab === "users" ? "block" : "none";
        document.getElementById("messagesTab").style.display = tab === "messages" ? "block" : "none";
        
        if (tab === "users") {
            await renderUsersTable();
        } else {
            await renderMessagesTable();
        }
    }

    // فیلتر فیلم‌ها
    function filterMovies(category) {
        currentCategory = category;
        document.querySelectorAll('.category-btn').forEach(btn => {
            if (btn.getAttribute('data-category') === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        renderMovies();
    }

    function renderMovies() {
        const grid = document.getElementById("moviesGrid");
        if (!grid) return;
        
        const filtered = moviesData.filter(m => m.category === currentCategory);
        if (!filtered.length) {
            grid.innerHTML = `<div style="text-align:center; padding:40px;">🎬 سریالی وجود ندارد</div>`;
            return;
        }
        
        grid.innerHTML = filtered.map(movie => `
            <div class="card">
                <div class="card-img">
                    <img src="${movie.image}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/300x400/1a0808/cc0000?text=No+Poster'">
                </div>
                <div class="card-content">
                    <div class="card-title">${escapeHtml(movie.title)}</div>
                    ${movie.episodes && movie.episodes.length ? `
                        <div class="episodes-dropdown">
                            <div class="dropdown-header" onclick="toggleDropdown(this)">
                                <span>📥 دانلود</span>
                                <span class="dropdown-arrow">▼</span>
                            </div>
                            <div class="dropdown-content">
                                ${movie.episodes.map(ep => `
                                    <a href="${ep.url || '#'}" class="episode-link" ${ep.url ? 'target="_blank"' : 'style="opacity:0.6;cursor:not-allowed;" onclick="return false;"'}>
                                        <span>${escapeHtml(ep.name)}</span>
                                        ${ep.url ? '<span class="download-badge">دانلود</span>' : '<span class="download-badge" style="background:#442222;">به زودی</span>'}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    ` : '<div style="color:#883333; font-size:0.7rem; padding:5px 0;">⏳ به زودی</div>'}
                </div>
            </div>
        `).join("");
    }

    function toggleDropdown(header) {
        const content = header.nextElementSibling;
        const arrow = header.querySelector('.dropdown-arrow');
        content.classList.toggle('show');
        arrow.classList.toggle('open');
    }

    function openMessageModal() {
        document.getElementById("messageModal").style.display = "flex";
        document.getElementById("messageText").value = "";
    }

    function closeMessageModal() {
        document.getElementById("messageModal").style.display = "none";
    }

    // ورود
    async function attemptLogin() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;
        const user = USERS_LIST.find(u => u.username === username && u.password === password);
        
        if (user) {
            currentUser = user;
            await syncUsers();
            await updateLastLogin(username);
            localStorage.setItem("cinema_currentUser", JSON.stringify({ username: user.username, role: user.role }));
            showMainPage();
            startOnlineTimer();
        } else {
            document.getElementById("loginError").innerText = "❌ نام کاربری یا رمز عبور اشتباه است";
        }
    }

    function startOnlineTimer() {
        if (onlineInterval) clearInterval(onlineInterval);
        onlineInterval = setInterval(() => {
            updateOnlineStatus();
        }, 30000);
    }

    function stopOnlineTimer() {
        if (onlineInterval) {
            clearInterval(onlineInterval);
            onlineInterval = null;
        }
    }

    // نمایش صفحه اصلی
    function showMainPage() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";
        document.getElementById("adminPage").style.display = "none";
        document.getElementById("currentUserDisplay").innerHTML = `${currentUser.username} ${getDeviceType()}`;
        
        const adminBtn = document.getElementById("adminPanelBtn");
        adminBtn.style.display = currentUser.role === "admin" ? "inline-block" : "none";
        
        filterMovies("iranian");
    }

    // نمایش پنل مدیریت
    async function showAdminPage() {
        if (currentUser.role !== "admin") return;
        
        if (adminRefreshInterval) clearInterval(adminRefreshInterval);
        
        document.getElementById("appPage").style.display = "none";
        document.getElementById("adminPage").style.display = "block";
        
        await renderUsersTable();
        await renderMessagesTable();
        
        adminRefreshInterval = setInterval(async () => {
            if (document.getElementById("adminPage").style.display === "block") {
                if (document.getElementById("usersTab").style.display !== "none") {
                    await renderUsersTable();
                } else {
                    await renderMessagesTable();
                }
            }
        }, 10000);
    }

    // خروج
    async function logout() {
        if (currentUser) {
            await setOffline(currentUser.username);
        }
        stopOnlineTimer();
        if (adminRefreshInterval) clearInterval(adminRefreshInterval);
        currentUser = null;
        localStorage.removeItem("cinema_currentUser");
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
        document.getElementById("adminPage").style.display = "none";
        document.getElementById("loginUsername").value = "";
        document.getElementById("loginPassword").value = "";
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // بررسی نشست
    async function checkSession() {
        await syncUsers();
        
        const saved = localStorage.getItem("cinema_currentUser");
        if (saved) {
            const userData = JSON.parse(saved);
            const user = USERS_LIST.find(u => u.username === userData.username && u.role === userData.role);
            if (user) {
                currentUser = user;
                await updateOnlineStatus();
                showMainPage();
                startOnlineTimer();
                return;
            }
        }
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
        document.getElementById("adminPage").style.display = "none";
    }

    // اجرای اولیه
    checkSession();
</script>
</body>
</html>
