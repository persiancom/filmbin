<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سینما خانگی | دانلود فیلم و سریال</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 10%, #0a0000 0%, #1a0101 50%, #000000 100%);
            font-family: 'Segoe UI', 'Poppins', Tahoma, sans-serif;
            min-height: 100vh;
            color: #fff;
        }

        .login-page, .app-page, .admin-page {
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: linear-gradient(145deg, #0f0505, #1a0808);
            border-radius: 40px;
            padding: 45px 35px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #ff2a2a40;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            text-align: center;
        }

        .login-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 0 auto 25px;
            overflow: hidden;
            border: 3px solid #cc0000;
            background: #1a0808;
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-box h2 {
            color: #ff8888;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffaaaa;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #2a0a0a;
            border: 1px solid #cc3333;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #cc0000;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #ff1a1a;
            transform: scale(1.02);
        }

        .error-msg {
            color: #ff6666;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .main-header {
            background: linear-gradient(135deg, rgba(180, 20, 30, 0.3), rgba(0, 0, 0, 0.7));
            border-radius: 30px;
            padding: 18px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #ff3333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .admin-link-btn {
            background: #cc0000;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .logout-btn {
            background: #2a0a0a;
            border: 1px solid #cc3333;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero-banner {
            margin-bottom: 30px;
            border-radius: 30px;
            overflow: hidden;
        }

        .hero-banner img {
            width: 100%;
            max-height: 380px;
            object-fit: cover;
            display: block;
        }

        .hero-text {
            text-align: center;
            margin-top: -50px;
            position: relative;
            z-index: 2;
            padding-bottom: 25px;
        }

        .hero-text h2 {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.4rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: linear-gradient(145deg, #0f0505, #1a0808);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #ff2a2a40;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #ff3333;
        }

        .card-img {
            width: 100%;
            height: 380px;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 18px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .card-type {
            display: inline-block;
            background: #cc0000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 15px;
        }

        .card-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
        }

        .btn-download {
            background: #b91c1c;
            color: white;
        }

        .btn-watch {
            background: #2d0a0a;
            color: #ff8888;
            border: 1px solid #aa3333;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 25px;
            color: #ffaa33;
            border-top: 1px solid #332222;
        }

        .admin-page {
            display: none;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            background: linear-gradient(135deg, rgba(180, 20, 30, 0.3), rgba(0, 0, 0, 0.7));
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .admin-panel-box {
            background: #0f0505;
            border-radius: 30px;
            padding: 25px;
            border: 1px solid #ff3333;
        }

        .users-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #332222;
        }

        th {
            color: #ffaaaa;
        }

        .back-to-site {
            background: #2a0a0a;
            border: 1px solid #cc3333;
            padding: 10px 25px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .download-code-btn {
            background: #2ea043;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .movies-grid {
                grid-template-columns: 1fr;
            }
            .hero-text h2 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <img src="https://github.com/persiancom/filmbin/blob/main/file_000000007c1071fbadfcb33b99bad87e.png?raw=true" alt="Logo" loading="eager">
            </div>
            <h2>ورود به سینما</h2>
            <div class="input-group">
                <label>نام کاربری</label>
                <input type="text" id="loginUsername" placeholder="نام کاربری خود را وارد کنید">
            </div>
            <div class="input-group">
                <label>رمز عبور</label>
                <input type="password" id="loginPassword" placeholder="رمز عبور">
            </div>
            <button class="login-btn" onclick="attemptLogin()">ورود</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>
</div>

<div id="appPage" class="app-page" style="display: none;">
    <div class="container">
        <div class="main-header">
            <div class="user-info">
                <span style="color:#ffaaaa;">خوش آمدی، </span>
                <strong id="currentUserDisplay"></strong>
                <button id="adminPanelBtn" class="admin-link-btn" style="display: none;" onclick="showAdminPage()">👑 پنل مدیریت</button>
            </div>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>

        <div class="hero-banner">
            <img src="https://github.com/persiancom/filmbin/blob/main/file_00000000d35471fb9298f545464b46f0.png?raw=true" alt="Hero Banner" loading="eager">
        </div>
        <div class="hero-text">
            <h2>✨ دانلود و تماشای فیلم و سریال ایرانی و خارجی ✨</h2>
        </div>

        <div id="moviesGrid" class="movies-grid"></div>

        <div class="footer">
            تهیه شده توسط Hamidreza
        </div>
    </div>
</div>

<div id="adminPage" class="admin-page">
    <div class="admin-container">
        <div class="admin-header">
            <h3 style="color:#ff8888;">👑 پنل مدیریت - گزارش ورود کاربران</h3>
            <button class="back-to-site" onclick="showMainPage()">↩️ بازگشت به سایت</button>
        </div>
        
        <div class="admin-panel-box">
            <div class="users-table">
                <table>
                    <thead>
                        <tr><th>نام کاربری</th><th>نوع کاربر</th><th>آخرین زمان ورود</th></tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
            <button class="download-code-btn" onclick="downloadUpdatedCode()">📥 دانلود کد به‌روز شده (برای آپلود روی گیت‌هاب)</button>
            <p style="font-size: 0.75rem; color: #888; margin-top: 15px; text-align: center;">
                🔒 بعد از تغییر لینک فیلم‌ها در کد، این دکمه رو بزن تا فایل HTML جدید دانلود بشه. سپس فایل رو روی گیت‌هاب آپلود کن.
            </p>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ✅ لینک فیلم و سریال ها (اینجا رو عوض کن)
    // ==========================================
    let moviesData = [
        {
            id: 1,
            title: "سریال گل سنگ",
            type: "سریال",
            image: "https://zardfilm.in/wp-content/uploads/2026/04/episode-2-gole--500x706.webp",
            downloadLink: "https://cf.linkulu.com/dl/6a2163946a48881ec0942904",  // لینک دانلود رو اینجا بذار
            watchLink: "",     // لینک تماشای آنلاین رو اینجا بذار
            downloadTitle: "دانلود سریال گل سنگ",
            watchTitle: "تماشای آنلاین گل سنگ"
        },
        {
            id: 2,
            title: "سریال بی عاطفه",
            type: "سریال",
            image: "https://zbcdn.cloud/files/cache/67480_69aa6bb103d5c1b228294640.4ac18b.jpg",
            downloadLink: "",
            watchLink: "",
            downloadTitle: "دانلود سریال بی عاطفه",
            watchTitle: "تماشای آنلاین بی عاطفه"
        },
        {
            id: 3,
            title: "سریال بیست و یک",
            type: "سریال",
            image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQPnQWgP4VBNgnXCM_RbsWnGW0NohgRNdxbZxG4zPZWc53wv9tD8s2h4pk&s=10",
            downloadLink: "",
            watchLink: "",
            downloadTitle: "دانلود سریال بیست و یک",
            watchTitle: "تماشای آنلاین بیست و یک"
        },
        {
            id: 4,
            title: "سریال هزار و یک شب",
            type: "سریال",
            image: "https://api2.filmzi.com/media/1001nights-poster-main-6947954d755a8b03beedfad2?w=1920&q=80",
            downloadLink: "",
            watchLink: "",
            downloadTitle: "دانلود سریال هزار و یک شب",
            watchTitle: "تماشای آنلاین هزار و یک شب"
        },
        {
            id: 5,
            title: "سریال بدنام",
            type: "سریال",
            image: "https://static.cdn.asset.filimo.com/flmt/mov_174988_343591.jpg?width=300&quality=85&sharpen=80&secret=ZaRTIhChiq5rD660aRzxNw",
            downloadLink: "",
            watchLink: "",
            downloadTitle: "دانلود سریال بدنام",
            watchTitle: "تماشای آنلاین بدنام"
        },
        {
            id: 6,
            title: "سریال مو به مو",
            type: "سریال",
            image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRkX72DwIPWEuz_0ETODdFnEM_HBYcq4VN9MjpdH1pZ8ipW5-sItCTQTUlI&s=10",
            downloadLink: "",
            watchLink: "",
            downloadTitle: "دانلود سریال مو به مو",
            watchTitle: "تماشای آنلاین مو به مو"
        },
        {
            id: 7,
            title: "سریال From",
            type: "سریال",
            image: "https://cdn.paraj.ir/images/66acd8101cecfa327abce7b7?w=3840&q=100",
            downloadLink: "",
            watchLink: "",
            downloadTitle: "دانلود سریال From",
            watchTitle: "تماشای آنلاین From"
        }
    ];

    // ==========================================
    // ✅ لیست کاربران (اینجا یوزر و رمز جدید اضافه کن)
    // ==========================================
    let users = [
        { username: "حمیدرضا", password: "CTF_22", role: "admin", lastLogin: "" },
        { username: "TV", password: "CTF22", role: "user", lastLogin: "" },
        // { username: "سارا", password: "456", role: "user", lastLogin: "" }
    ];

    let currentUser = null;

    // ========== توابع ذخیره و بارگذاری ==========
    function loadUsers() {
        const savedLastLogins = localStorage.getItem("cinema_lastLogins");
        if (savedLastLogins) {
            const lastLogins = JSON.parse(savedLastLogins);
            users.forEach(user => {
                if (lastLogins[user.username]) {
                    user.lastLogin = lastLogins[user.username];
                }
            });
        }
    }

    function saveLastLogins() {
        const lastLogins = {};
        users.forEach(user => {
            if (user.lastLogin) {
                lastLogins[user.username] = user.lastLogin;
            }
        });
        localStorage.setItem("cinema_lastLogins", JSON.stringify(lastLogins));
    }

    function updateLastLogin(username) {
        const user = users.find(u => u.username === username);
        if (user) {
            const now = new Date();
            user.lastLogin = `${now.toLocaleDateString('fa-IR')} - ${now.toLocaleTimeString('fa-IR')}`;
            saveLastLogins();
        }
    }

    // ========== توابع نمایش ==========
    function renderMovies() {
        const grid = document.getElementById("moviesGrid");
        if (!grid) return;
        
        grid.innerHTML = moviesData.map(movie => `
            <div class="card">
                <div class="card-img">
                    <img src="${movie.image}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/500x700/1a0808/cc0000?text=No+Poster'">
                </div>
                <div class="card-content">
                    <div class="card-title">${escapeHtml(movie.title)}</div>
                    <div class="card-type">${movie.type}</div>
                    <div class="card-links">
                        ${movie.downloadLink ? `<a href="${escapeHtml(movie.downloadLink)}" class="btn btn-download" target="_blank">⬇️ ${escapeHtml(movie.downloadTitle)}</a>` : '<span style="color:#883333;">⏳ لینک به زودی</span>'}
                        ${movie.watchLink ? `<a href="${escapeHtml(movie.watchLink)}" class="btn btn-watch" target="_blank">▶️ ${escapeHtml(movie.watchTitle)}</a>` : ''}
                    </div>
                </div>
            </div>
        `).join("");
    }
    
    function renderUsersTable() {
        const tbody = document.getElementById("usersTableBody");
        if (!tbody) return;
        
        tbody.innerHTML = "";
        users.forEach(user => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = user.username;
            row.insertCell(1).innerText = user.role === "admin" ? "مدیر" : "کاربر";
            row.insertCell(2).innerText = user.lastLogin || "هنوز وارد نشده";
        });
    }
    
    function downloadUpdatedCode() {
        // ساخت کد جدید با لینک‌های به‌روز شده
        const currentCode = document.documentElement.outerHTML;
        
        // دانلود فایل
        const blob = new Blob([currentCode], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "index.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert("✅ فایل دانلود شد! حالا این فایل رو روی گیت‌هاب آپلود کن تا لینک‌های جدید برای همه نمایش داده بشه.");
    }
    
    // ========== توابع اصلی ==========
    function attemptLogin() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;
        const user = users.find(u => u.username === username && u.password === password);
        
        if (user) {
            currentUser = user;
            updateLastLogin(username);
            localStorage.setItem("cinema_currentUser", JSON.stringify({ username: user.username, role: user.role }));
            showMainPage();
        } else {
            document.getElementById("loginError").innerText = "❌ نام کاربری یا رمز عبور اشتباه است";
        }
    }
    
    function showMainPage() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";
        document.getElementById("adminPage").style.display = "none";
        document.getElementById("currentUserDisplay").innerText = currentUser.username;
        
        const adminBtn = document.getElementById("adminPanelBtn");
        if (currentUser.role === "admin") {
            adminBtn.style.display = "inline-block";
        } else {
            adminBtn.style.display = "none";
        }
        renderMovies();
    }
    
    function showAdminPage() {
        if (currentUser.role !== "admin") return;
        document.getElementById("appPage").style.display = "none";
        document.getElementById("adminPage").style.display = "block";
        renderUsersTable();
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("cinema_currentUser");
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
        document.getElementById("adminPage").style.display = "none";
        document.getElementById("loginUsername").value = "";
        document.getElementById("loginPassword").value = "";
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function checkSession() {
        loadUsers();
        
        const saved = localStorage.getItem("cinema_currentUser");
        if (saved) {
            const userData = JSON.parse(saved);
            const user = users.find(u => u.username === userData.username && u.role === userData.role);
            if (user) {
                currentUser = user;
                showMainPage();
                return;
            }
        }
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("appPage").style.display = "none";
        document.getElementById("adminPage").style.display = "none";
    }
    
    checkSession();
</script>
</body>
</html>
